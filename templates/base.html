<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nursmentor</title>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Nursmentor</a>
        <div class="ms-auto">
          {% if user.is_authenticated %}
            <span class="navbar-text text-light me-3">Hello, {{ user.username }}</span>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'home' %}">Dashboard</a>
            <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Logout</a>
          {% else %}
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Login</a>
            <a class="btn btn-primary btn-sm" href="{% url 'signup' %}">Sign up</a>
          {% endif %}
        </div>
      </div>
    </nav>
    {% block content %}{% endblock %}
    {% bootstrap_javascript %}
  </body>
</html>
